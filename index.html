<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skyra Heart Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a18;--s1:#0c1229;--s2:#111a3a;--accent:#38bdf8;--accent2:#a78bfa;--pink:#f472b6;--green:#34d399;--gold:#fbbf24;--text:#e2e8f0;--muted:#64748b}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Aurora background */
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.18;animation:drift 20s ease-in-out infinite}
.ab1{width:600px;height:600px;background:var(--accent);top:-200px;left:-100px;animation-delay:0s}
.ab2{width:500px;height:500px;background:var(--accent2);bottom:-150px;right:-100px;animation-delay:-7s}
.ab3{width:400px;height:400px;background:var(--pink);top:40%;left:50%;animation-delay:-14s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.1)}66%{transform:translate(-40px,50px) scale(.9)}}

/* Stars */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.7}}

/* Content */
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}

/* Logo area */
.logo-ring{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--pink));padding:3px;animation:spin 8s linear infinite;margin-bottom:28px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.logo-inner{width:100%;height:100%;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:2.8rem}

/* Title */
.title{font-size:clamp(2rem,6vw,3.2rem);font-weight:900;text-align:center;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:fadeUp .8s ease both}
.subtitle{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:40px;animation:fadeUp .8s ease .15s both}

/* Cards */
.cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:600px;width:100%;margin-bottom:36px;animation:fadeUp .8s ease .3s both}
.card{flex:1;min-width:140px;max-width:180px;background:var(--s1);border:1px solid rgba(56,189,248,.1);border-radius:16px;padding:20px 16px;text-align:center;transition:all .3s ease;cursor:default}
.card:hover{transform:translateY(-4px);border-color:rgba(56,189,248,.3);box-shadow:0 8px 32px rgba(56,189,248,.08)}
.card-icon{font-size:1.6rem;margin-bottom:8px}
.card-title{font-size:.82rem;font-weight:700;margin-bottom:4px}
.card-desc{font-size:.65rem;color:var(--muted);line-height:1.5}

/* CTA */
.cta-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;animation:fadeUp .8s ease .45s both;margin-bottom:32px}
.cta{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;text-decoration:none;transition:all .3s ease;border:none;cursor:pointer}
.cta-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 24px rgba(56,189,248,.25)}
.cta-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(56,189,248,.35)}
.cta-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(255,255,255,.12)}
.cta-secondary:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}

/* Social */
.socials{display:flex;gap:10px;animation:fadeUp .8s ease .6s both;margin-bottom:24px}
.soc{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;font-size:.7rem;font-weight:600;text-decoration:none;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);transition:all .3s ease}
.soc:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}
.soc-ig{border-color:rgba(244,114,182,.3)}
.soc-wa{border-color:rgba(52,211,153,.3)}

/* Footer */
.footer{font-size:.6rem;color:var(--muted);text-align:center;animation:fadeUp .8s ease .7s both}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Responsive */
@media(max-width:480px){.cards{gap:10px}.card{min-width:120px;padding:16px 12px}.cta{padding:12px 22px;font-size:.82rem}}
</style>
</head>
<body>

<div class="aurora">
<div class="aurora-blob ab1"></div>
<div class="aurora-blob ab2"></div>
<div class="aurora-blob ab3"></div>
</div>

<div class="stars" id="stars"></div>

<div class="page">

<div class="logo-ring"><div class="logo-inner">💙</div></div>

<h1 class="title">Skyra Heart Store</h1>
<p class="subtitle">Sky: Children of the Light — Heart Service</p>

<div class="cards">
<div class="card">
<div class="card-icon">⚡</div>
<div class="card-title">Instant</div>
<div class="card-desc">Langsung dikirim. Maks 300/hari.</div>
</div>
<div class="card">
<div class="card-icon">💎</div>
<div class="card-title">Special</div>
<div class="card-desc">1 hari. Kirim ke 3 teman.</div>
</div>
<div class="card">
<div class="card-icon">🔄</div>
<div class="card-title">Reguler</div>
<div class="card-desc">Harian via bot. Harga terbaik.</div>
</div>
</div>

<div class="cta-group">
<a href="https://script.google.com/macros/s/AKfycby3vP1_UZn-LA83rf6mEFAZlszRDJgcmQaQpjc9U9A0NKqVIhOFq0LT3j8PS-joVGA/exec" class="cta cta-primary">🛒 Order Sekarang</a>
<a href="https://script.google.com/macros/s/AKfycby3vP1_UZn-LA83rf6mEFAZlszRDJgcmQaQpjc9U9A0NKqVIhOFq0LT3j8PS-joVGA/exec" class="cta cta-secondary">📦 Track Pesanan</a>
</div>

<div class="socials">
<a href="https://www.instagram.com/skyra_store" target="_blank" class="soc soc-ig">📸 @skyra_store</a>
<a href="https://wa.me/6285183346300" target="_blank" class="soc soc-wa">💬 WhatsApp</a>
</div>

<div class="footer">© 2026 Skyra Heart Store</div>

</div>

<script>
// Generate stars
var s=document.getElementById('stars');
for(var i=0;i<80;i++){var d=document.createElement('div');d.className='star';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';d.style.width=d.style.height=(.5+Math.random()*1.5)+'px';d.style.animationDelay=Math.random()*4+'s';d.style.animationDuration=(3+Math.random()*3)+'s';s.appendChild(d)}
</script>
</body>
</html>
